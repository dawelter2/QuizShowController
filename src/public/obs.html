<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Show - Transmissão</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; width: 1920px; height: 1080px; overflow: hidden; background: #0f0f1a; }
  body.transparent { background: transparent; }

  /* ─── Topo: rodada + ordem buzinas ─── */
  .top-bar { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; align-items: center; }
  .round-badge { background: rgba(15,15,26,.85); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: .4rem 1rem; font-size: 1rem; font-weight: 600; backdrop-filter: blur(8px); }
  .buzzer-order { background: rgba(15,15,26,.85); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: .4rem 1rem; display: none; gap: .75rem; backdrop-filter: blur(8px); }
  .buzzer-order.show { display: flex; }
  .bo-item { display: flex; align-items: center; gap: .4rem; font-size: .9rem; }
  .bo-pos { background: #6c5ce7; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; }

  /* ─── Ranking (canto direito) ─── */
  .ranking { position: absolute; top: 100px; right: 40px; width: 320px; background: rgba(15,15,26,.88); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 1.25rem; backdrop-filter: blur(12px); }
  .ranking h2 { font-size: .85rem; text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.4); margin-bottom: .75rem; }
  .rank-row { display: flex; align-items: center; gap: .75rem; padding: .5rem 0; border-bottom: 1px solid rgba(255,255,255,.04); }
  .rank-row:last-child { border-bottom: none; }
  .rank-pos { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
  .rank-1 { background: #fdcb6e; color: #1a1a2e; }
  .rank-2 { background: #b2bec3; color: #1a1a2e; }
  .rank-3 { background: #e17055; color: #fff; }
  .rank-rest { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }
  .rank-name { flex: 1; font-weight: 600; font-size: 1rem; }
  .rank-score { font-size: 1.2rem; font-weight: 800; color: #fdcb6e; }
  .rank-bar { height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .rank-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #6c5ce7, #a29bfe); transition: width .4s ease; }

  /* ─── Barra inferior: status dos jogadores ─── */
  .bottom-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
  .player-chip { background: rgba(15,15,26,.8); border: 1px solid rgba(255,255,255,.06); border-radius: 20px; padding: .3rem .75rem .3rem .3rem; display: flex; align-items: center; gap: .5rem; backdrop-filter: blur(8px); transition: all .3s; }
  .player-chip.buzzed { border-color: #fdcb6e; box-shadow: 0 0 15px rgba(253,203,110,.25); }
  .chip-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .7rem; flex-shrink: 0; }
  .chip-name { font-size: .8rem; font-weight: 600; }
  .chip-score { font-size: .85rem; font-weight: 700; color: #fdcb6e; }

  /* ─── Debug ─── */
  #status { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.9); color: #0f0; padding: 6px 16px; font-size: 13px; font-family: monospace; z-index: 999; text-align: center; }
  .toggle-bg { position: fixed; top: 10px; right: 10px; z-index: 999; background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.5); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .toggle-bg:hover { background: rgba(0,0,0,.8); color: #fff; }
</style>
</head>
<body>
<div class="top-bar">
  <div class="round-badge" id="obs-round">Aguardando...</div>
  <div class="buzzer-order" id="obs-buzzer-order"></div>
</div>

<div class="ranking" id="obs-ranking">
  <h2>🏆 Ranking</h2>
  <div id="obs-ranking-list"><div style="color:rgba(255,255,255,.2);padding:.5rem 0;">Nenhum jogador</div></div>
</div>

<div class="bottom-bar" id="obs-bottom-bar"></div>

<button class="toggle-bg" onclick="document.body.classList.toggle('transparent')">◐ Fundo</button>
<div id="status">⏳ Carregando...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  var status = document.getElementById('status');
  function log(m) { status.textContent = new Date().toLocaleTimeString() + ' ' + m; console.log('[OBS]', m); }
  var playerScores = {};
  var playerColors = {};
  var colors = ['#6c5ce7','#00b894','#fdcb6e','#d63031','#0984e3','#e17055','#00cec9','#a29bfe'];
  function getColor(n) { if(!playerColors[n]) playerColors[n]=colors[Object.keys(playerColors).length%colors.length]; return playerColors[n]; }
  function cssSafe(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
  function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  function renderAll(scores) {
    renderRanking(scores);
    renderChips(scores);
  }

  function renderRanking(scores) {
    var list = document.getElementById('obs-ranking-list');
    if (!scores || !scores.length) {
      list.innerHTML = '<div style="color:rgba(255,255,255,.2);padding:.5rem 0;">Nenhum jogador</div>';
      return;
    }
    var sorted = scores.slice().sort(function(a,b){ return b.score - a.score; });
    var maxScore = Math.max(sorted[0].score, 1);
    list.innerHTML = sorted.map(function(s, i){
      var posClass = i < 3 ? 'rank-'+(i+1) : 'rank-rest';
      var posText = ['🥇','🥈','🥉'][i] || (i+1)+'º';
      var pct = Math.max((s.score / maxScore) * 100, 4);
      return '<div class="rank-row">'
        + '<div class="rank-pos ' + posClass + '">' + posText + '</div>'
        + '<div style="flex:1;">'
        + '<div class="rank-name">' + esc(s.player_name) + '</div>'
        + '<div class="rank-bar"><div class="rank-bar-fill" style="width:'+pct+'%"></div></div>'
        + '</div>'
        + '<div class="rank-score">' + s.score + '</div>'
        + '</div>';
    }).join('');
  }

  function renderChips(scores) {
    var bar = document.getElementById('obs-bottom-bar');
    if (!scores || !scores.length) {
      bar.innerHTML = '';
      return;
    }
    var sorted = scores.slice().sort(function(a,b){ return b.score - a.score; });
    bar.innerHTML = sorted.map(function(s){
      var c = getColor(s.player_name);
      var ini = (s.player_name||'?').charAt(0).toUpperCase();
      return '<div class="player-chip" id="chip-'+cssSafe(s.player_id)+'">'
        + '<div class="chip-avatar" style="background:'+c+'">'+ini+'</div>'
        + '<span class="chip-name">'+esc(s.player_name)+'</span>'
        + '<span class="chip-score">'+s.score+'</span>'
        + '</div>';
    }).join('');
  }

  log('Iniciando...');
  var roomCode = new URLSearchParams(window.location.search).get('sala');
  log('Sala: ' + roomCode);
  if (!roomCode) { log('Sem codigo'); document.getElementById('obs-round').textContent='⚠️ Sem sala'; return; }

  fetch('/api/rooms/' + roomCode)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.room) { log('Sala nao encontrada'); return; }
      log('Conectando...');
      var socket = io('/', { query: { room_id: data.room.id, user_id: 'obs-' + roomCode } });

      socket.on('connect', function(){ log('Conectado!'); });
      socket.on('connect_error', function(err){ log('Erro: '+err.message); });
      socket.on('disconnect', function(){ log('Desconectou'); });

      socket.on('rodada:iniciada', function(d){
        document.getElementById('obs-round').textContent = 'Rodada ' + d.round_number;
      });
      socket.on('rodada:proxima', function(){
        document.getElementById('obs-round').textContent = 'Aguardando...';
        document.getElementById('obs-buzzer-order').classList.remove('show');
        document.getElementById('obs-buzzer-order').innerHTML = '';
      });

      socket.on('buzina:ordem', function(d){
        var c = document.getElementById('obs-buzzer-order');
        if (!d.order || !d.order.length) return;
        c.innerHTML = d.order.map(function(o){
          return '<div class="bo-item"><span class="bo-pos">'+o.position+'º</span><span>'+esc(o.player_name)+'</span></div>';
        }).join('');
        c.classList.add('show');
        d.order.forEach(function(o){
          var chip = document.getElementById('chip-'+cssSafe(o.player_id));
          if (chip) chip.classList.add('buzzed');
        });
      });

      socket.on('placar:atualizado', function(d){
        log('Placar: '+(d.scores||[]).map(function(s){return s.player_name+'='+s.score}).join(' '));
        if (d.scores) { d.scores.forEach(function(s){ playerScores[s.player_id]=s.score; }); renderAll(d.scores); }
      });

      socket.on('sala:status', function(d){
        log('Status: '+(d.scores||[]).length+' scores');
        if (d.scores) { d.scores.forEach(function(s){ playerScores[s.player_id]=s.score; }); renderAll(d.scores); }
        if (d.current_round) document.getElementById('obs-round').textContent = 'Rodada '+d.current_round.round_number;
      });
    })
    .catch(function(err){ log('Erro fetch: '+err.message); });
})();
</script>
</body>
</html>
