<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Show — Transmissão</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; width: 1920px; height: 1080px; overflow: hidden; background: #0f0f1a; }
  body.transparent { background: transparent; }

  /* ─── Animações compartilhadas ─── */
  @keyframes goldPulseA { 0%,100% { box-shadow: 0 0 18px rgba(253,203,110,.4), 0 8px 24px rgba(0,0,0,.4); } 50% { box-shadow: 0 0 40px rgba(253,203,110,.85), 0 8px 24px rgba(0,0,0,.4); } }
  @keyframes goldPulseB { 0%,100% { box-shadow: 0 0 25px rgba(253,203,110,.6), inset 0 0 0 2px #fdcb6e; } 50% { box-shadow: 0 0 55px rgba(253,203,110,1), inset 0 0 0 2px #ffd700; } }
  @keyframes goldPulseC { 0%,100% { box-shadow: 0 0 30px rgba(253,203,110,.15); } 50% { box-shadow: 0 0 55px rgba(253,203,110,.45); } }
  @keyframes goldPulseD { 0%,100% { box-shadow: 0 0 20px rgba(0,255,234,.4), 0 0 30px rgba(253,203,110,.3); } 50% { box-shadow: 0 0 45px rgba(0,255,234,.75), 0 0 55px rgba(253,203,110,.65); } }
  @keyframes livePulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  @keyframes neonFlash { 0%,100% { border-color: #6c5ce7; box-shadow: 0 0 12px rgba(108,92,231,.6); } 50% { border-color: #fdcb6e; box-shadow: 0 0 22px rgba(253,203,110,.85); } }
  @keyframes stripes { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
  @keyframes armedPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,68,68,.7); } 50% { box-shadow: 0 0 0 6px rgba(255,68,68,0); } }
  @keyframes deltaPop { 0% { opacity: 0; transform: scale(.5) translateY(-4px); } 60% { opacity: 1; transform: scale(1.15) translateY(0); } 100% { transform: scale(1) translateY(0); } }

  /* ─── Módulo unificado: posicionamento base ─── */
  #widget-ranking { position: absolute; top: 140px; left: 50%; transform: translateX(-50%); width: 560px; padding: 1.5rem; }
  #widget-ranking .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 1rem; }
  #widget-ranking .header-left { display: flex; align-items: baseline; gap: .75rem; min-width: 0; }
  #widget-ranking .header h2 { text-transform: uppercase; white-space: nowrap; }
  #widget-ranking .round-label { font-size: .8rem; font-weight: 700; letter-spacing: .08em; padding: .2rem .6rem; border-radius: 8px; background: rgba(255,255,255,.06); color: rgba(255,255,255,.65); transition: background .3s, color .3s, box-shadow .3s, border-color .3s; white-space: nowrap; }
  #widget-ranking .live { display: flex; align-items: center; gap: .35rem; white-space: nowrap; }
  #widget-ranking .live .dot { width: 8px; height: 8px; border-radius: 50%; animation: livePulse 1.5s ease-in-out infinite; }
  #widget-ranking .list { position: relative; }

  /* ─── Rank-row: colunas fixas via grid ─── */
  #widget-ranking .rank-row { display: grid; grid-template-columns: 18px 34px 1fr 70px 56px; align-items: center; gap: .7rem; transition: transform .35s cubic-bezier(.2,.7,.2,1); }
  #widget-ranking .rank-trend { width: 18px; text-align: center; font-size: .9rem; font-weight: 800; color: transparent; }
  #widget-ranking .rank-trend.up { color: #00b894; }
  #widget-ranking .rank-trend.down { color: #d63031; }
  #widget-ranking .rank-pos { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #widget-ranking .rank-main { min-width: 0; }
  #widget-ranking .rank-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #widget-ranking .rank-score { position: relative; min-width: 70px; text-align: right; font-variant-numeric: tabular-nums; }
  #widget-ranking .rank-score-value { display: inline-block; }
  #widget-ranking .rank-delta { position: absolute; top: -.7rem; right: 0; font-size: .65rem; font-weight: 800; padding: .08rem .35rem; border-radius: 6px; animation: deltaPop .4s ease-out; pointer-events: none; line-height: 1.2; }
  #widget-ranking .rank-delta.delta-pos { background: rgba(0,184,148,.25); color: #2ee5a8; border: 1px solid rgba(0,184,148,.55); }
  #widget-ranking .rank-delta.delta-neg { background: rgba(214,48,49,.25); color: #ff7878; border: 1px solid rgba(214,48,49,.55); }
  #widget-ranking .rank-buzzer { display: flex; align-items: center; justify-content: center; }
  #widget-ranking .rank-buzzer .bz { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 900; transition: background .2s, box-shadow .2s, color .2s; }
  #widget-ranking .rank-buzzer.neutral .bz { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); color: rgba(255,255,255,.25); }
  #widget-ranking .rank-buzzer.armed .bz { background: #ff4444; border: 1px solid #ff7878; color: #fff; animation: armedPulse 1.2s ease-out infinite; }
  #widget-ranking .rank-buzzer.buzzed .bz { background: #00b894; border: 1px solid #00d4a8; color: #08130f; box-shadow: 0 0 14px rgba(0,184,148,.7); }

  /* Empty-slot: placeholder com mesma altura */
  #widget-ranking .rank-row.empty-slot { opacity: .35; }
  #widget-ranking .rank-row.empty-slot .rank-name,
  #widget-ranking .rank-row.empty-slot .rank-score { color: rgba(255,255,255,.2); }
  #widget-ranking .rank-row.empty-slot .rank-buzzer { visibility: hidden; }
  #widget-ranking .rank-row.empty-slot .rank-trend { color: transparent; }

  /* ════════════════════════════════════════════════
     TEMA A — Premium Glass + Gradientes
     ════════════════════════════════════════════════ */
  body.theme-a #widget-ranking { background: linear-gradient(135deg, rgba(35,35,58,.95), rgba(15,15,26,.98)); border: 1px solid rgba(255,255,255,.1); border-radius: 18px; box-shadow: 0 14px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06); backdrop-filter: blur(14px); }
  body.theme-a #widget-ranking .header h2 { font-size: 1.05rem; font-weight: 800; letter-spacing: .15em; color: rgba(255,255,255,.7); }
  body.theme-a #widget-ranking .round-label { background: rgba(255,255,255,.06); color: rgba(255,255,255,.65); border: 1px solid rgba(255,255,255,.08); }
  body.theme-a #widget-ranking .round-label.active { background: rgba(255,107,107,.18); color: #ff8a8a; border-color: rgba(255,107,107,.45); box-shadow: 0 0 12px rgba(255,107,107,.4); }
  body.theme-a #widget-ranking .live { font-size: .7rem; font-weight: 800; color: #ff6b6b; letter-spacing: .15em; }
  body.theme-a #widget-ranking .live .dot { background: #ff6b6b; }
  body.theme-a #widget-ranking .rank-row { padding: .55rem .65rem; border-radius: 12px; margin-bottom: .3rem; background: rgba(255,255,255,.02); }
  body.theme-a #widget-ranking .rank-row.first-place { background: linear-gradient(90deg, rgba(253,203,110,.18), rgba(253,203,110,.04)); border: 1px solid rgba(253,203,110,.4); animation: goldPulseA 1.6s ease-in-out infinite; }
  body.theme-a #widget-ranking .rank-row.empty-slot { background: rgba(255,255,255,.01); border: 1px dashed rgba(255,255,255,.06); }
  body.theme-a #widget-ranking .rank-pos { width: 34px; height: 34px; border-radius: 50%; font-weight: 800; font-size: 1rem; background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); }
  body.theme-a #widget-ranking .rank-row[data-pos="1"]:not(.empty-slot) .rank-pos { background: linear-gradient(135deg, #fdcb6e, #ffa600); color: #1a1a2e; font-size: 1.3rem; }
  body.theme-a #widget-ranking .rank-row[data-pos="2"]:not(.empty-slot) .rank-pos { background: linear-gradient(135deg, #dfe6e9, #b2bec3); color: #1a1a2e; font-size: 1.3rem; }
  body.theme-a #widget-ranking .rank-row[data-pos="3"]:not(.empty-slot) .rank-pos { background: linear-gradient(135deg, #fab1a0, #e17055); color: #fff; font-size: 1.3rem; }
  body.theme-a #widget-ranking .rank-name { font-weight: 700; font-size: 1.15rem; }
  body.theme-a #widget-ranking .rank-bar { height: 5px; background: rgba(255,255,255,.06); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  body.theme-a #widget-ranking .rank-bar-fill { height: 100%; background: linear-gradient(90deg, #6c5ce7, #a29bfe); box-shadow: 0 0 8px rgba(108,92,231,.5); transition: width .6s cubic-bezier(.2,.7,.2,1); }
  body.theme-a #widget-ranking .first-place .rank-bar-fill { background: linear-gradient(90deg, #fdcb6e, #ffd700); box-shadow: 0 0 12px rgba(253,203,110,.8); }
  body.theme-a #widget-ranking .rank-score { font-size: 1.55rem; font-weight: 900; color: #fdcb6e; letter-spacing: -.02em; }

  /* ════════════════════════════════════════════════
     TEMA B — Game Show / Show do Milhão
     ════════════════════════════════════════════════ */
  body.theme-b { background: #16041e; }
  body.theme-b #widget-ranking { background: linear-gradient(180deg, #2a0a4a, #1a0533); border: 3px solid #6c5ce7; border-radius: 12px; animation: neonFlash 2s ease-in-out infinite; }
  body.theme-b #widget-ranking .header { padding-bottom: .55rem; border-bottom: 2px solid rgba(253,203,110,.4); margin-bottom: .9rem; }
  body.theme-b #widget-ranking .header h2 { font-size: 1.15rem; font-weight: 900; letter-spacing: .22em; color: #fdcb6e; text-shadow: 0 0 14px rgba(253,203,110,.8); }
  body.theme-b #widget-ranking .round-label { background: rgba(108,92,231,.25); color: #c8bdfb; border: 1px solid rgba(108,92,231,.55); text-shadow: 0 0 6px rgba(108,92,231,.7); }
  body.theme-b #widget-ranking .round-label.active { background: rgba(255,46,46,.28); color: #ff9b9b; border-color: #ff2e2e; text-shadow: 0 0 10px rgba(255,46,46,.9); box-shadow: 0 0 14px rgba(255,46,46,.5); }
  body.theme-b #widget-ranking .live { font-size: .75rem; font-weight: 900; color: #ff2e2e; letter-spacing: .2em; text-shadow: 0 0 10px rgba(255,46,46,.9); }
  body.theme-b #widget-ranking .live .dot { background: #ff2e2e; box-shadow: 0 0 12px #ff2e2e; animation: livePulse .8s ease-in-out infinite; }
  body.theme-b #widget-ranking .rank-row { padding: .5rem .55rem; margin-bottom: .35rem; border: 1px solid rgba(108,92,231,.4); border-radius: 6px; background: rgba(108,92,231,.08); }
  body.theme-b #widget-ranking .rank-row.empty-slot { border: 1px dashed rgba(108,92,231,.2); background: rgba(108,92,231,.03); }
  body.theme-b #widget-ranking .rank-row.first-place { background: linear-gradient(90deg, rgba(253,203,110,.3), rgba(253,203,110,.1)); border: 2px solid #fdcb6e; animation: goldPulseB 1.4s ease-in-out infinite; }
  body.theme-b #widget-ranking .rank-pos { width: 34px; height: 34px; border-radius: 4px; font-weight: 900; font-size: 1.05rem; background: #2d1b5a; color: #a29bfe; }
  body.theme-b #widget-ranking .rank-row[data-pos="1"]:not(.empty-slot) .rank-pos { background: #fdcb6e; color: #1a1a2e; box-shadow: 0 0 14px rgba(253,203,110,.85); }
  body.theme-b #widget-ranking .rank-row[data-pos="2"]:not(.empty-slot) .rank-pos { background: #dfe6e9; color: #1a1a2e; }
  body.theme-b #widget-ranking .rank-row[data-pos="3"]:not(.empty-slot) .rank-pos { background: #e17055; color: #fff; }
  body.theme-b #widget-ranking .rank-name { font-weight: 800; font-size: 1.15rem; letter-spacing: .04em; text-transform: uppercase; }
  body.theme-b #widget-ranking .rank-bar { height: 5px; background: rgba(255,255,255,.08); margin-top: 5px; overflow: hidden; }
  body.theme-b #widget-ranking .rank-bar-fill { height: 100%; background: linear-gradient(90deg, #6c5ce7, #ff2e88); transition: width .5s ease; }
  body.theme-b #widget-ranking .first-place .rank-bar-fill { background: linear-gradient(90deg, #fdcb6e, #ffd700, #fdcb6e); box-shadow: 0 0 12px #fdcb6e; }
  body.theme-b #widget-ranking .rank-score { font-size: 1.65rem; font-weight: 900; color: #fdcb6e; text-shadow: 0 0 12px rgba(253,203,110,.65); }

  /* ════════════════════════════════════════════════
     TEMA C — Minimalista Elegante
     ════════════════════════════════════════════════ */
  body.theme-c { background: #08080c; }
  body.theme-c #widget-ranking { background: transparent; padding: 2rem; }
  body.theme-c #widget-ranking .header { padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 1.25rem; align-items: baseline; }
  body.theme-c #widget-ranking .header h2 { font-size: .85rem; font-weight: 500; letter-spacing: .35em; color: rgba(255,255,255,.45); }
  body.theme-c #widget-ranking .round-label { background: transparent; color: rgba(255,255,255,.4); border: 1px solid rgba(255,255,255,.1); font-weight: 400; letter-spacing: .15em; }
  body.theme-c #widget-ranking .round-label.active { color: #ff8a8a; border-color: rgba(255,107,107,.4); background: rgba(255,107,107,.05); }
  body.theme-c #widget-ranking .live { font-size: .65rem; font-weight: 500; color: rgba(255,255,255,.4); letter-spacing: .25em; }
  body.theme-c #widget-ranking .live .dot { width: 6px; height: 6px; background: #ff6b6b; }
  body.theme-c #widget-ranking .rank-row { padding: .7rem 0; border-bottom: 1px solid rgba(255,255,255,.05); margin-bottom: 0; }
  body.theme-c #widget-ranking .rank-row:last-child { border-bottom: none; }
  body.theme-c #widget-ranking .rank-row.empty-slot { border-bottom: 1px solid rgba(255,255,255,.02); }
  body.theme-c #widget-ranking .rank-row.first-place { padding: 1.1rem 0; animation: goldPulseC 2s ease-in-out infinite; border-bottom: 1px solid rgba(253,203,110,.2); }
  body.theme-c #widget-ranking .rank-pos { background: transparent; font-size: 1rem; font-weight: 300; color: rgba(255,255,255,.3); }
  body.theme-c #widget-ranking .rank-row[data-pos="1"]:not(.empty-slot) .rank-pos,
  body.theme-c #widget-ranking .rank-row[data-pos="2"]:not(.empty-slot) .rank-pos,
  body.theme-c #widget-ranking .rank-row[data-pos="3"]:not(.empty-slot) .rank-pos { font-size: 1.5rem; }
  body.theme-c #widget-ranking .rank-row.first-place .rank-pos { color: #fdcb6e; }
  body.theme-c #widget-ranking .rank-name { font-weight: 300; font-size: 1.4rem; letter-spacing: -.01em; }
  body.theme-c #widget-ranking .rank-row.first-place .rank-name { font-weight: 500; font-size: 1.6rem; }
  body.theme-c #widget-ranking .rank-bar { display: none; }
  body.theme-c #widget-ranking .rank-score { font-size: 1.85rem; font-weight: 200; color: #fff; letter-spacing: -.04em; }
  body.theme-c #widget-ranking .rank-row.first-place .rank-score { font-size: 2.2rem; font-weight: 300; color: #fdcb6e; }
  body.theme-c #widget-ranking .rank-buzzer .bz { background: transparent; border-color: rgba(255,255,255,.12); }

  /* ════════════════════════════════════════════════
     TEMA D — Esports / Dashboard Moderno
     ════════════════════════════════════════════════ */
  body.theme-d { background: #050a10; }
  body.theme-d #widget-ranking { background: linear-gradient(135deg, #0d1b1e, #061015); border: 1px solid rgba(0,255,234,.25); clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px)); }
  body.theme-d #widget-ranking .header { padding-bottom: .55rem; border-bottom: 1px solid rgba(0,255,234,.2); margin-bottom: 1rem; }
  body.theme-d #widget-ranking .header h2 { font-size: .95rem; font-weight: 800; letter-spacing: .2em; color: #00ffea; font-family: 'JetBrains Mono','Fira Code',monospace; }
  body.theme-d #widget-ranking .round-label { background: rgba(0,255,234,.08); color: rgba(0,255,234,.75); border: 1px solid rgba(0,255,234,.3); font-family: 'JetBrains Mono','Fira Code',monospace; }
  body.theme-d #widget-ranking .round-label.active { background: rgba(255,46,136,.18); color: #ff77b3; border-color: #ff2e88; box-shadow: 0 0 12px rgba(255,46,136,.5); }
  body.theme-d #widget-ranking .live { font-size: .7rem; font-weight: 700; color: #ff2e88; letter-spacing: .15em; font-family: 'JetBrains Mono',monospace; }
  body.theme-d #widget-ranking .live .dot { background: #ff2e88; box-shadow: 0 0 10px #ff2e88; }
  body.theme-d #widget-ranking .rank-row { padding: .55rem .55rem; margin-bottom: .3rem; background: rgba(0,255,234,.04); border-left: 2px solid rgba(0,255,234,.25); clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
  body.theme-d #widget-ranking .rank-row.empty-slot { background: rgba(0,255,234,.015); border-left: 2px solid rgba(0,255,234,.08); }
  body.theme-d #widget-ranking .rank-row.first-place { background: linear-gradient(90deg, rgba(253,203,110,.18), rgba(0,255,234,.05)); border-left: 3px solid #fdcb6e; animation: goldPulseD 1.5s ease-in-out infinite; }
  body.theme-d #widget-ranking .rank-pos { font-family: 'JetBrains Mono',monospace; font-size: .8rem; font-weight: 800; color: rgba(0,255,234,.7); padding: .2rem .35rem; background: rgba(0,255,234,.1); border-radius: 3px; width: auto; height: auto; }
  body.theme-d #widget-ranking .rank-row.first-place .rank-pos { background: rgba(253,203,110,.28); color: #fdcb6e; }
  body.theme-d #widget-ranking .rank-name { font-weight: 700; font-size: 1.05rem; text-transform: uppercase; letter-spacing: .05em; }
  body.theme-d #widget-ranking .rank-bar { height: 3px; background: rgba(0,255,234,.08); margin-top: 5px; overflow: hidden; }
  body.theme-d #widget-ranking .rank-bar-fill { height: 100%; background: repeating-linear-gradient(45deg, #00ffea 0 10px, #00d4c4 10px 20px); background-size: 30px 100%; animation: stripes 1s linear infinite; transition: width .5s ease; }
  body.theme-d #widget-ranking .first-place .rank-bar-fill { background: repeating-linear-gradient(45deg, #fdcb6e 0 10px, #ffd700 10px 20px); background-size: 30px 100%; }
  body.theme-d #widget-ranking .rank-score { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 1.45rem; font-weight: 800; color: #00ffea; text-shadow: 0 0 10px rgba(0,255,234,.55); }
  body.theme-d #widget-ranking .first-place .rank-score { color: #fdcb6e; text-shadow: 0 0 12px rgba(253,203,110,.65); }
  /* Tema D: magenta no estado armed (combina com a paleta esports) */
  body.theme-d #widget-ranking .rank-buzzer.armed .bz { background: #ff2e88; border-color: #ff77b3; color: #fff; animation: armedPulse 1.2s ease-out infinite; box-shadow: 0 0 0 0 rgba(255,46,136,.7); }
  body.theme-d #widget-ranking .rank-buzzer.buzzed .bz { background: #00ffea; color: #050a10; border-color: #00d4c4; box-shadow: 0 0 12px rgba(0,255,234,.6); }

  /* ─── Overlay GO! ─── */
  .round-go { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1000; opacity: 0; }
  .round-go .go-text { font-size: clamp(8rem, 22vw, 16rem); font-weight: 900; color: #fdcb6e; text-shadow: 0 0 40px rgba(253,203,110,.9), 0 0 80px rgba(253,203,110,.4); transform: scale(.3); letter-spacing: .05em; }
  .round-go.show { animation: goPop .6s ease-out forwards; }
  .round-go.show .go-text { animation: goText .6s ease-out forwards; }
  @keyframes goPop { 0% { opacity: 0; } 25% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes goText { 0% { transform: scale(.3); } 40% { transform: scale(1.18); } 70% { transform: scale(1); } 100% { transform: scale(1.05); } }

  /* ─── Switcher de tema (dev/preview) ─── */
  .theme-switcher { position: fixed; bottom: 10px; left: 10px; z-index: 999; display: flex; gap: 4px; background: rgba(0,0,0,.6); padding: 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); }
  .theme-switcher button { background: transparent; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.6); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer; min-width: 28px; }
  .theme-switcher button:hover { background: rgba(255,255,255,.08); color: #fff; }
  .theme-switcher button.active { background: #fdcb6e; color: #1a1a2e; border-color: #fdcb6e; }

  /* ─── Dev utils ─── */
  #status { position: fixed; bottom: 0; right: 0; background: rgba(0,0,0,.85); color: #0f0; padding: 4px 12px; font-size: 11px; font-family: monospace; z-index: 998; }
  .toggle-bg { position: fixed; top: 10px; right: 10px; z-index: 999; background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.5); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .toggle-bg:hover { background: rgba(0,0,0,.8); color: #fff; }
</style>
</head>
<body class="theme-a">

<!-- Overlay full-screen GO! -->
<div class="round-go" id="round-go"><div class="go-text">GO!</div></div>

<!-- Módulo unificado -->
<div id="widget-ranking">
  <div class="header">
    <div class="header-left">
      <h2>🏆 Ranking</h2>
      <span class="round-label" id="round-label">Aguardando...</span>
    </div>
    <span class="live"><span class="dot"></span>AO VIVO</span>
  </div>
  <div class="list" id="ranking-list"></div>
</div>

<!-- Dev/preview controls -->
<div class="theme-switcher" id="theme-switcher">
  <button data-theme="a">A</button>
  <button data-theme="b">B</button>
  <button data-theme="c">C</button>
  <button data-theme="d">D</button>
</div>
<button class="toggle-bg" onclick="document.body.classList.toggle('transparent')">◐ Fundo</button>
<div id="status">⏳ Carregando...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  // ─── Tema ─────────────────────────────────
  var VALID = ['a','b','c','d'];
  function getInitialTheme() {
    var urlTheme = (new URLSearchParams(location.search).get('tema') || '').toLowerCase();
    if (VALID.indexOf(urlTheme) !== -1) return urlTheme;
    var stored = (localStorage.getItem('score_theme') || '').toLowerCase();
    if (VALID.indexOf(stored) !== -1) return stored;
    return 'a';
  }
  function applyTheme(t) {
    document.body.classList.remove('theme-a','theme-b','theme-c','theme-d');
    document.body.classList.add('theme-'+t);
    localStorage.setItem('score_theme', t);
    var sw = document.getElementById('theme-switcher');
    sw.querySelectorAll('button').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-theme') === t); });
    var url = new URL(location.href);
    url.searchParams.set('tema', t);
    history.replaceState(null, '', url.toString());
  }
  applyTheme(getInitialTheme());
  document.getElementById('theme-switcher').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-theme]');
    if (btn) applyTheme(btn.getAttribute('data-theme'));
  });

  // ─── Estado / helpers ─────────────────────
  var SLOT_COUNT = 10;
  var status = document.getElementById('status');
  function log(m) { status.textContent = new Date().toLocaleTimeString() + ' ' + m; console.log('[SCORE]', m); }
  function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  var currentScores = [];
  var currentRoundNumber = null;
  var currentRoundActive = false;
  var buzzedOrderByPid = {};      // pid → posição (1,2,3,...)
  var lastDeltaByPid = {};        // pid → último delta de score (persiste até rodada:iniciada)
  var prevRankByPid = {};         // pid → rank antes da última mudança (1-based)
  var rankTrendByPid = {};        // pid → 'up' | 'down' (persiste até próxima mudança de rank)
  var prevDisplayedScores = {};   // pid → último score exibido (para tween e detecção de delta)
  var prevPositions = {};         // pid → top px (animação FLIP)

  function showRoundGo() {
    var el = document.getElementById('round-go');
    if (!el) return;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    var h = function(){ el.classList.remove('show'); el.removeEventListener('animationend', h); };
    el.addEventListener('animationend', h);
  }

  function animateNumber(el, from, to, ms) {
    if (from === to) { el.textContent = to; return; }
    var start = performance.now();
    function step(now) {
      var t = Math.min(1, (now - start) / ms);
      var eased = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * eased);
      if (t < 1) requestAnimationFrame(step);
      else el.textContent = to;
    }
    requestAnimationFrame(step);
  }

  function updateRoundLabel() {
    var el = document.getElementById('round-label');
    if (currentRoundActive && currentRoundNumber != null) {
      el.textContent = 'Rodada ' + currentRoundNumber;
      el.classList.add('active');
    } else if (currentRoundNumber != null) {
      el.textContent = 'Rodada ' + currentRoundNumber;
      el.classList.remove('active');
    } else {
      el.textContent = 'Aguardando...';
      el.classList.remove('active');
    }
  }

  function ingestScores(scores) {
    if (!scores) return;
    scores.forEach(function(s){
      var prev = prevDisplayedScores[s.player_id];
      if (prev !== undefined && prev !== s.score) {
        lastDeltaByPid[s.player_id] = s.score - prev;
      }
    });
    currentScores = scores;
  }

  function computeRankTrends(sorted) {
    sorted.forEach(function(s, i){
      var pid = s.player_id;
      var newRank = i + 1;
      var prev = prevRankByPid[pid];
      if (prev === undefined) {
        prevRankByPid[pid] = newRank;
      } else if (prev !== newRank) {
        rankTrendByPid[pid] = (newRank < prev) ? 'up' : 'down';
        prevRankByPid[pid] = newRank;
      }
    });
  }

  function renderModule() {
    var list = document.getElementById('ranking-list');
    var sorted = (currentScores || []).slice().sort(function(a,b){ return b.score - a.score; });
    sorted = sorted.slice(0, SLOT_COUNT);
    var maxScore = sorted.length ? Math.max(sorted[0].score, 1) : 1;

    computeRankTrends(sorted);

    var oldPositions = {};
    Object.keys(prevPositions).forEach(function(pid){ oldPositions[pid] = prevPositions[pid]; });

    var html = '';
    sorted.forEach(function(s, i){
      // Calcula posição real baseada em empates (Standard Competition Ranking)
      var pos = sorted.filter(function(other){ return other.score > s.score; }).length + 1;
      
      var posText = ['🥇','🥈','🥉'][pos - 1] || pos + 'º';
      var pct = Math.max((s.score / maxScore) * 100, 4);
      var firstCls = pos === 1 ? ' first-place' : '';
      var prevScore = prevDisplayedScores[s.player_id];
      var initialScore = (prevScore !== undefined) ? prevScore : s.score;

      var trend = rankTrendByPid[s.player_id];
      var trendCls = trend === 'up' ? ' up' : (trend === 'down' ? ' down' : '');
      var trendChar = trend === 'up' ? '▲' : (trend === 'down' ? '▼' : '');
      var trendHtml = '<div class="rank-trend'+trendCls+'">'+trendChar+'</div>';

      var delta = lastDeltaByPid[s.player_id];
      var deltaHtml = '';
      if (delta !== undefined && delta !== 0) {
        var sign = delta > 0 ? '+' : '';
        var dcls = delta > 0 ? 'delta-pos' : 'delta-neg';
        deltaHtml = '<span class="rank-delta '+dcls+'">'+sign+delta+'</span>';
      }

      var bzClass = 'neutral';
      var bzContent = '';
      if (buzzedOrderByPid[s.player_id]) {
        bzClass = 'buzzed';
        bzContent = buzzedOrderByPid[s.player_id] + 'º';
      } else if (currentRoundActive) {
        bzClass = 'armed';
      }
      var buzzerHtml = '<div class="rank-buzzer '+bzClass+'"><span class="bz">'+bzContent+'</span></div>';

      html += '<div class="rank-row'+firstCls+'" data-pid="'+esc(s.player_id)+'" data-pos="'+pos+'">'
        + trendHtml
        + '<div class="rank-pos">' + posText + '</div>'
        + '<div class="rank-main"><div class="rank-name">' + esc(s.player_name) + '</div><div class="rank-bar"><div class="rank-bar-fill" style="width:'+pct+'%"></div></div></div>'
        + '<div class="rank-score"><span class="rank-score-value" data-pid="'+esc(s.player_id)+'" data-from="'+initialScore+'" data-to="'+s.score+'">' + initialScore + '</span>' + deltaHtml + '</div>'
        + buzzerHtml
        + '</div>';
    });

    // Slots vazios para completar 10
    for (var j = sorted.length; j < SLOT_COUNT; j++) {
      var posJ = j + 1;
      var posTextJ = ['🥇','🥈','🥉'][j] || posJ + 'º';
      html += '<div class="rank-row empty-slot" data-pos="'+posJ+'">'
        + '<div class="rank-trend"></div>'
        + '<div class="rank-pos">' + posTextJ + '</div>'
        + '<div class="rank-main"><div class="rank-name">—</div><div class="rank-bar"><div class="rank-bar-fill" style="width:0%"></div></div></div>'
        + '<div class="rank-score">—</div>'
        + '<div class="rank-buzzer neutral"><span class="bz"></span></div>'
        + '</div>';
    }

    list.innerHTML = html;

    // FLIP animação de transição de posição
    var rows = list.querySelectorAll('.rank-row[data-pid]');
    var newPositions = {};
    rows.forEach(function(row){
      var pid = row.getAttribute('data-pid');
      var rect = row.getBoundingClientRect();
      newPositions[pid] = rect.top;
      if (oldPositions[pid] !== undefined) {
        var dy = oldPositions[pid] - rect.top;
        if (dy !== 0) {
          row.style.transition = 'none';
          row.style.transform = 'translateY('+dy+'px)';
          requestAnimationFrame(function(){
            row.style.transition = '';
            row.style.transform = '';
          });
        }
      }
    });
    prevPositions = newPositions;

    // Tween de scores (animateNumber atua só no .rank-score-value, preservando o badge)
    list.querySelectorAll('.rank-score-value[data-pid]').forEach(function(el){
      var pid = el.getAttribute('data-pid');
      var from = parseInt(el.getAttribute('data-from'), 10) || 0;
      var to = parseInt(el.getAttribute('data-to'), 10) || 0;
      animateNumber(el, from, to, 500);
      prevDisplayedScores[pid] = to;
    });
  }

  // Render inicial vazio: já mostra os 10 slots como placeholder
  renderModule();
  updateRoundLabel();

  log('Iniciando...');
  var roomCode = new URLSearchParams(window.location.search).get('sala');
  log('Sala: ' + roomCode);
  if (!roomCode) { log('Sem codigo'); document.getElementById('round-label').textContent='⚠️ Sem sala'; return; }

  fetch('/api/rooms/' + roomCode)
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (!data.room) { log('Sala nao encontrada'); return; }

    var roomTitle = data.room.title || 'Quiz Show';
    document.title = roomTitle + ' — Transmissão';

    log('Conectando...');

      var socket = io('/', { query: { room_id: data.room.id, user_id: 'score-' + roomCode } });

      socket.on('connect', function(){ log('Conectado!'); });
      socket.on('connect_error', function(err){ log('Erro: '+err.message); });
      socket.on('disconnect', function(){ log('Desconectou'); });

      socket.on('rodada:iniciada', function(d){
        currentRoundNumber = d.round_number;
        currentRoundActive = true;
        buzzedOrderByPid = {};
        lastDeltaByPid = {};
        updateRoundLabel();
        renderModule();
        showRoundGo();
      });

      socket.on('rodada:proxima', function(){
        currentRoundActive = false;
        buzzedOrderByPid = {};
        updateRoundLabel();
        renderModule();
      });

      socket.on('buzina:ordem', function(d){
        var order = d.order || [];
        buzzedOrderByPid = {};
        order.forEach(function(o){ buzzedOrderByPid[o.player_id] = o.position; });
        renderModule();
      });

      socket.on('placar:atualizado', function(d){
        if (d.scores) {
          ingestScores(d.scores);
          renderModule();
        }
      });

      socket.on('sala:status', function(d){
        if (d.scores) {
          // No primeiro status, semeia os "prev" para não disparar deltas falsos.
          if (Object.keys(prevDisplayedScores).length === 0) {
            d.scores.forEach(function(s){ prevDisplayedScores[s.player_id] = s.score; });
          }
          ingestScores(d.scores);
        }
        if (d.current_round) {
          currentRoundNumber = d.current_round.round_number;
          currentRoundActive = (d.current_round.status === 'active');
          buzzedOrderByPid = {};
          (d.current_round.buzzer_order || []).forEach(function(o){ buzzedOrderByPid[o.player_id] = o.position; });
        } else {
          currentRoundNumber = null;
          currentRoundActive = false;
          buzzedOrderByPid = {};
        }
        updateRoundLabel();
        renderModule();
      });
    })
    .catch(function(err){ log('Erro fetch: '+err.message); });
})();
</script>
</body>
</html>
